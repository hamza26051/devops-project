<!DOCTYPE html>
<html>
<head>
  <title>Login with X</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #0f1419;
      color: white;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      background: #1da1f2;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    button:hover {
      background: #0d8ddb;
    }
  </style>
</head>

<body>

  <div style="text-align:center">
    <h2>CarRent AI Login</h2>
    <button onclick="login()">Login with X</button>
    <p id="status"></p>
  </div>

  <script>
    function login() {
      document.getElementById("status").innerText = "Redirecting to Twitter...";

      // Opens backend endpoint which redirects to Twitter
      window.location.href = "http://localhost:8000/login";
    }
  </script>

</body>
</html>
