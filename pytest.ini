[pytest]
# ══════════════════════════════════════════════════════════════════
# pytest.ini — VeriDrive regression test configuration
# ══════════════════════════════════════════════════════════════════

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output format
addopts =
    --tb=short
    --strict-markers
    -q

# Custom markers (prevents PytestUnknownMarkWarning in CI)
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests requiring live external services

# Minimum pytest version
minversion = 8.0

# Fail fast on first failure in CI — saves time when model is broken
# Remove -x if you want to see all failures at once (useful locally)
# addopts = -x   # Uncomment to enable fail-fast